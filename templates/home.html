{% extends 'base.html' %}

{% block content %}

<h2>All Events</h2>

{% for event in events %}
    <div>
        <h3>
            <a href="/event/{{ event.id }}/">{{ event.title }}</a>
        </h3>
        <p>{{ event.description }}</p>
        <p>{{ event.location }}</p>
        <p>{{ event.date|date:"d.m.Y H:i" }}</p>
    </div>
    <hr>
{% empty %}
    <p>No events yet.</p>
{% endfor %}

{% endblock %}
